name: benlemi-sync

# Daily: fetch the LIVE Benlemi feed (runner is not sandboxed), refresh the
# `benlemi` tab in the shared Google Sheet with pending/done status. You review
# the tab, apply pending tag changes in Shopify, and mark rows done.

on:
  schedule:
    - cron: "0 5 * * *"      # daily 05:00 UTC - adjust as needed
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Refresh Benlemi tab
        env:
          BENLEMI_FEED_URL: ${{ secrets.BENLEMI_FEED_URL }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}   # same secret as yedoo checker
          # For the live Admin API source (no CSV), also add these two secrets and
          # swap --export for --shopify-domain below:
          # SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_DE_TOKEN }}
        run: |
          python3 benlemi_sheet_sync.py \
            --times-xlsx data/benlemi_match.xlsx \
            --export data/products_export_DE.csv \
            --backend gsheet \
            --gsheet-id 1TBHy5JnGQ1iCOXw_gV_-cl_slRJ-vWlpZUGPVpwlJ9Q \
            --tab benlemi
          # LIVE Admin API variant (replaces the --export line above):
          #   --shopify-domain busykids-de.myshopify.com \
